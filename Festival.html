<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Score Tracker - Master List</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-nav: #11151f;
            --accent-orange: #ff9100;
            --accent-green: #2ecc71; /* New vibrant green for checkboxes */
            --accent-blue: #5c85ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --row-bg: rgba(255, 255, 255, 0.03);
            --row-hover: rgba(255, 255, 255, 0.08);
            --nav-height: 80px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* --- Header: Main Navigation --- */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 3000;
            background: var(--bg-nav);
            height: var(--nav-height);
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-orange);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-orange);
            text-shadow: 0 0 12px rgba(255, 145, 0, 0.5);
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-bar {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            width: 250px;
            outline: none;
        }

        .search-bar:focus { border-color: var(--accent-orange); }

        select.sort-dropdown {
            background: #1a1f2e;
            color: white;
            border: 1px solid var(--border-color);
            padding: 9px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-save {
            background: var(--accent-orange);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- Table Styling --- */
        .table-wrap {
            padding: 0 20px 120px 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            min-width: 1400px;
        }

        thead th {
            position: sticky;
            top: var(--nav-height);
            z-index: 2000;
            background: #1a1f2e;
            padding: 20px 10px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--text-dim);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        tbody tr { background: var(--row-bg); transition: background 0.2s; }
        tbody tr:hover { background: var(--row-hover); }

        td {
            padding: 12px 10px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .song-cell {
            text-align: left;
            color: var(--accent-orange);
            font-weight: bold;
            padding-left: 20px;
            border-left: 1px solid var(--border-color);
            border-radius: 12px 0 0 12px;
            width: 280px;
        }

        .last-cell {
            border-right: 1px solid var(--border-color);
            border-radius: 0 12px 12px 0;
        }

        /* --- Custom Score Inputs --- */
        input[type="number"] {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent-orange);
            width: 90px;
            padding: 8px;
            text-align: center;
            border-radius: 12px; /* Rounded boxes */
            font-family: 'Courier New', Courier, monospace;
            outline: none;
            transition: 0.2s;
            -moz-appearance: textfield; /* Firefox: Remove arrows */
        }

        /* Chrome, Safari, Edge: Remove arrows */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: var(--accent-orange);
            background: rgba(255, 145, 0, 0.05);
        }

        /* --- Custom Circular Checkboxes --- */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--border-color);
            border-radius: 50%; /* Circle shape */
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input[type="checkbox"]:checked {
            background: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }

        .diff-badge {
            background: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* --- Floating Footer --- */
        .footer-tools {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(17, 21, 31, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            z-index: 4000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-add:hover { border-color: white; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="brand"><h1>Festival Tracker</h1></div>
    <div class="nav-controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="Find a song..." onkeyup="filterSongs()">
        <select id="sortSelect" class="sort-dropdown" onchange="handleSort()">
            <option value="alpha-asc">A-Z</option>
            <option value="alpha-desc">Z-A</option>
            <option value="vS-desc">High Score: Vocals</option>
            <option value="bS-desc">High Score: Bass</option>
            <option value="lS-desc">High Score: Lead</option>
            <option value="dS-desc">High Score: Drums</option>
        </select>
        <button class="btn-save" onclick="saveData()">Save Progress</button>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th class="song-cell">Song</th>
                <th>Diff</th>
                <th style="color:#ffaa00">Vocals Score</th><th style="color:#ffaa00">FC</th><th style="color:#ffaa00">PFC</th>

                <th style="color:#ff4444">Lead Score</th><th style="color:#ff4444">FC</th><th style="color:#ff4444">PFC</th>
                <th style="color:#aa44ff">Drums Score</th><th style="color:#aa44ff">FC</th><th style="color:#aa44ff">PFC</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="footer-tools">
    <button class="btn-add" onclick="addCustomRows(1)">+1 Entry</button>
    <button class="btn-add" onclick="addCustomRows(10)">+10 Entries</button>
    <button class="btn-add" onclick="addCustomRows(100)">+100 Entries</button>
</div>

    const tableBody = document.getElementById('tableBody');

    window.onload = () => {
        const saved = localStorage.getItem('festival_final_data');
        if (saved) {
            currentData = JSON.parse(saved);
            masterSongList.forEach(name => {
                if (!currentData.find(d => d.song === name)) {
                    currentData.push(createEmptyObj(name));
                }
            });
        } else {
            currentData = masterSongList.map(name => createEmptyObj(name));
        }

    };

                <td class="song-cell">${data.song}</td>
                <td><span class="diff-badge">X</span></td>
                <td><input type="number" value="${data.vS}" data-key="vS"></td>
                <td><input type="checkbox" ${data.vFC ? 'checked' : ''} data-key="vFC"></td>
                <td><input type="checkbox" ${data.vP ? 'checked' : ''} data-key="vP"></td>
                <td><input type="number" value="${data.bS}" data-key="bS"></td>
                <td><input type="checkbox" ${data.bFC ? 'checked' : ''} data-key="bFC"></td>
                <td><input type="checkbox" ${data.bP ? 'checked' : ''} data-key="bP"></td>
                <td><input type="number" value="${data.lS}" data-key="lS"></td>
                <td><input type="checkbox" ${data.lFC ? 'checked' : ''} data-key="lFC"></td>
                <td><input type="checkbox" ${data.lP ? 'checked' : ''} data-key="lP"></td>
                <td><input type="number" value="${data.dS}" data-key="dS"></td>
                <td><input type="checkbox" ${data.dFC ? 'checked' : ''} data-key="dFC"></td>
                <td class="last-cell"><input type="checkbox" ${data.dP ? 'checked' : ''} data-key="dP"></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function syncCurrentData() {
        const rows = tableBody.querySelectorAll('tr');
        currentData = Array.from(rows).map(tr => {
            const obj = { song: tr.querySelector('.song-cell').innerText };
            tr.querySelectorAll('input').forEach(input => {
                obj[input.dataset.key] = input.type === 'checkbox' ? input.checked : input.value;
            });
            return obj;
        });
    }

    function handleSort() {
        syncCurrentData();
        const criteria = document.getElementById('sortSelect').value;
        if (criteria === 'alpha-asc') {
            currentData.sort((a, b) => a.song.localeCompare(b.song));
        } else if (criteria === 'alpha-desc') {
            currentData.sort((a, b) => b.song.localeCompare(a.song));
        } else {
            const key = criteria.split('-')[0];
            currentData.sort((a, b) => (Number(b[key]) || 0) - (Number(a[key]) || 0));
        }
        renderTable(currentData);
    }

    function filterSongs() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const rows = tableBody.querySelectorAll('tr');
        rows.forEach(row => {
            const text = row.querySelector('.song-cell').innerText.toLowerCase();
            row.style.display = text.includes(query) ? '' : 'none';
        });
    }

    function addCustomRows(n) {
        for(let i=0; i<n; i++) {
            currentData.push(createEmptyObj("CUSTOM ENTRY"));
        }
        renderTable(currentData);
    }

    function saveData() {
        syncCurrentData();
        localStorage.setItem('festival_final_data', JSON.stringify(currentData));
        alert("Success: All data saved locally!");
    }
</script>

</body>
</html>

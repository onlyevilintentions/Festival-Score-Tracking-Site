<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Leaderboard Tracker</title>
    <style>
        :root {
            --bg-dark: #07090f;
            --bg-row: #10131d;
            --bg-input: #1b1f2e;
            --border-input: #3a3f55;
            --text-main: #f0f2f5;
            --text-dim: #99aab5;
            
            --accent-green: #2ecc71; 
            --orange-vocal: #ff9100;
            --yellow-bass: #f1c40f;
            --blue-lead: #87ceeb;
            --magenta-drums: #ff00ff;
            
            --fc-gold: #f1c40f;
            --pfc-blue: #87ceeb; /* Baby Blue */
            --pfc-gradient: linear-gradient(90deg, #f1c40f 0%, #87ceeb 100%);
            
            --nav-height: 90px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow-x: auto;
        }

        .header-stack {
            position: sticky;
            top: 0;
            z-index: 10000;
            background: var(--bg-dark);
            min-width: 1400px;
        }

        .top-nav {
            height: var(--nav-height);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-green);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-container h1 {
            margin: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-green);
        }

        /* Stats Readability Enhancements */
        .progress-stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .stat-card {
            background: #161b2a;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid var(--border-input);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stat-label { 
            font-size: 0.75rem; 
            color: white; 
            font-weight: 800; 
            margin-bottom: 4px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-count { 
            font-size: 1.3rem; 
            font-weight: 900; 
        }

        /* Specific Colors for Stats */
        #ownedCount { color: var(--accent-green); }
        #fcCount { color: var(--fc-gold); } /* Yellow */
        #pfcCount { color: var(--pfc-blue); } /* Baby Blue */

        .search-bar {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-input);
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            width: 250px;
            outline: none;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 100px 300px 120px 50px 50px 120px 50px 50px 120px 50px 50px 120px 50px 50px;
            width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .grid-header {
            height: 60px;
            background: #090c13;
            border-bottom: 1px solid var(--border-input);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--text-dim);
        }

        .grid-header div { display: flex; justify-content: center; align-items: center; height: 100%; }

        .list-container {
            padding: 15px 0 60px 0;
            display: flex; flex-direction: column; gap: 6px; align-items: center;
        }

        .song-row {
            background: var(--bg-row);
            min-height: 75px;
            border-radius: 4px;
        }

        .row-fc { background: var(--fc-gold) !important; }
        .row-pfc { background: var(--pfc-gradient) !important; }
        .row-fc .song-title, .row-pfc .song-title { color: #000 !important; }
        .row-fc .cell, .row-pfc .cell { color: #000 !important; }

        .cell { display: flex; justify-content: center; align-items: center; }

        .song-title {
            justify-content: flex-start !important;
            color: var(--accent-green) !important;
            font-weight: bold; font-size: 1.05rem; padding-left: 10px;
        }

        input[type="text"].score-input {
            background: var(--bg-input);
            border: 2px solid var(--border-input);
            color: white; 
            width: 100px; 
            padding: 12px 0;
            text-align: center;
            border-radius: 25px; 
            outline: none; 
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
        }

        .hide-scores-active .score-input { opacity: 0; pointer-events: none; }

        input[type="checkbox"] {
            appearance: none; width: 30px; height: 30px;
            border: 2px solid var(--border-input); border-radius: 50%;
            cursor: pointer; position: relative;
        }

        input[type="checkbox"]:checked { background: var(--accent-green); border-color: var(--accent-green); }
        .row-fc input[type="checkbox"]:checked, .row-pfc input[type="checkbox"]:checked {
            background: #000; border-color: #000;
        }

        input[type="checkbox"]:checked::after {
            content: '✓'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: black; font-weight: bold;
        }

        .btn-action {
            background: var(--accent-green); color: black; border: none;
            padding: 12px 20px; border-radius: 8px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-secondary {
            background: #222;
            color: #fff;
            border: 1px solid var(--border-input);
            margin-left: 10px;
        }
    </style>
</head>

                <div class="cell"><input type="text" inputmode="numeric" class="score-input" value="${data.dS || ''}" data-key="dS"></div>
                <div class="cell"><input type="checkbox" ${data.dFC ? 'checked' : ''} data-key="dFC" onchange="updateHighlightsAndStats()"></div>
                <div class="cell"><input type="checkbox" ${data.dP ? 'checked' : ''} data-key="dP" onchange="updateHighlightsAndStats()"></div>
            `;
            container.appendChild(row);
        });
    }

    function updateHighlightsAndStats() {
        const rows = document.querySelectorAll('.song-row');
        let totalOwned = 0;
        let totalFC = 0;
        let totalPFC = 0;
        const totalPossibleInstruments = rows.length * 4;

        rows.forEach(row => {
            const checkboxes = row.querySelectorAll('input[type="checkbox"]');
            let instFC = 0;
            let instPFC = 0;

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const key = cb.dataset.key;
                    if (key === 'owned') totalOwned++;
                    else if (key.endsWith('FC')) { instFC++; totalFC++; }
                    else if (key.endsWith('P')) { instPFC++; totalPFC++; }
                }
            });

            row.classList.remove('row-fc', 'row-pfc');
            if (instPFC === 4) row.classList.add('row-pfc');
            else if (instFC === 4) row.classList.add('row-fc');
        });

        document.getElementById('ownedCount').innerText = `${totalOwned} / ${rows.length}`;
        document.getElementById('fcCount').innerText = `${totalFC} / ${totalPossibleInstruments}`;
        document.getElementById('pfcCount').innerText = `${totalPFC} / ${totalPossibleInstruments}`;
    }

    function saveData() {
        const rows = document.querySelectorAll('.song-row');
        const newData = Array.from(rows).map(row => {
            const songName = row.querySelector('.song-title').innerText;
            const obj = { song: songName };
            row.querySelectorAll('input').forEach(input => {
                obj[input.dataset.key] = input.type === 'checkbox' ? input.checked : input.value;
            });
            return obj;
        });
        localStorage.setItem('festival_vFinal_data', JSON.stringify(newData));
        alert("Leaderboard Synchronized!");
    }

    function filterSongs() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('.song-row');
        rows.forEach(row => {
            const title = row.querySelector('.song-title').innerText.toLowerCase();
            row.style.display = title.includes(query) ? 'grid' : 'none';
        });
    }

    function addCustom() {
        const name = prompt("Enter Song Name:");
        if (name) {
            currentData.push(createEmptyObj(name.toUpperCase()));
            currentData.sort((a, b) => a.song.localeCompare(b.song));
            renderList(currentData);
            updateHighlightsAndStats();
        }
    }
</script>
</body>
</html>
